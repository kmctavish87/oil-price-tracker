services:
  - type: web
    name: oil-price-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: EIA_API_KEY
        sync: false
      - key: OILPRICE_API_TOKEN
        sync: false
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://kmctavish87.github.io
